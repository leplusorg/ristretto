# This workflow will build a Java project with Maven
# For more information see:
# https://help.github.com/actions/language-and-framework-guides
# /building-and-testing-java-with-maven

name: Maven Dependency Check

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

env:
  MAVEN_OPTS: >
    -Dhttps.protocols=TLSv1.2
    -Dmaven.repo.local=.m2/repository
    -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true
    -Djava.awt.headless=true
  MAVEN_CLI_OPTS: >
    --batch-mode
    --errors
    --fail-at-end
    --show-version
    -DinstallAtEnd=true
    -DdeployAtEnd=true

jobs:
  maven-dependency-check:
    runs-on: ubuntu-latest
    permissions:
      # Required to read the code
      contents: read
      # Required to upload the SARIF file to the security tab
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25
      - name: Cache Maven dependencies
        # setup-java's built-in cache targets ~/.m2/repository, but this build
        # redirects the local repo to .m2/repository (see -Dmaven.repo.local in
        # MAVEN_OPTS), so cache it at the location the build actually uses. The
        # NVD database under it is excluded - it is cached separately below with
        # a rotating key.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .m2/repository
            !.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Cache dependency-check NVD database
        # Persist the NVD database (an H2 DB that dependency-check stores under
        # the local Maven repo) between runs. dependency-check updates it
        # incrementally, so restoring the previous copy turns the slow,
        # rate-limit-prone full NVD download into a quick delta update. The
        # unique per-run key always saves the freshly-updated DB; restore-keys
        # restores the most recent previous copy as the starting point.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .m2/repository/org/owasp/dependency-check-data
          key: dependency-check-data-${{ github.run_id }}
          restore-keys: |
            dependency-check-data-
      - name: Dependency Check with Maven
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          # Do not set IFS=$'\n\t', breaks ${MAVEN_CLI_OPTS}
          # The NVD API key is read from the NVD_API_KEY environment variable by
          # the pom (dependencyCheck.NVDApiKey default), so the secret is never
          # passed on the command line where it would be visible in the process
          # list.
          # SARIF is generated so the findings can be uploaded to the GitHub
          # Security tab. The report is written before failBuildOnCVSS is
          # evaluated, so the file exists even when the scan fails the build.
          # shellcheck disable=SC2086 # [Double quote to prevent globbing and word splitting]: splitting is desired for MAVEN_CLI_OPTS
          ./mvnw ${MAVEN_CLI_OPTS} -Dformat=SARIF dependency-check:aggregate
      - name: Upload dependency-check scan results to GitHub Security tab
        # Upload even when the previous step fails the build on a vulnerability,
        # otherwise the findings would never reach the Security tab.
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: target/dependency-check-report.sarif
      - name: Clean up
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          rm "${HOME}/.m2/settings.xml"
